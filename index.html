            const [debouncedValue, setDebouncedValue] = React.useState(value);
            useEffect(() => {
                const timer = setTimeout(() => setDebouncedValue(value), delay);
                return () => clearTimeout(timer);
            }, [value, delay]);

        // =========================================================================

        function hashPassword(password) {
            return CryptoJS.SHA256(password).toString();
        }

        // Custom API fetcher
        async function apiCall(config, action, data = {}) {
            const apiUrl = HARDCODED_API_URL || config.api;
            if (!apiUrl) throw new Error("API URL is not configured");

            const payload = {
                action,
                sheetId: DEFAULT_SHEET_ID || config.sheetId,
                folderId: DEFAULT_FOLDER_ID || config.folderId,
                ...data
            };

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (!result.success) throw new Error(result.message);
                return result.data;
            } catch (error) {
                console.error("API Error:", error);
                throw new Error("Koneksi gagal: " + error.message + ". (Cek Console F12 untuk detailnya)");
            }
        }

                e.preventDefault();
                setSetupLoading(true);
                try {
                    await apiCall(form, 'setup');
                    localStorage.setItem('appConfig', JSON.stringify(form));
                    setConfig(form);
                    setAppState('LOGIN');
                    showToast('Database berhasil disetup!', 'success');

        const filterByDateType = (dateStr, type, customStart, customEnd) => {
            if (!dateStr) return false;
            const tDate = new Date(dateStr);
            if (isNaN(tDate)) return false;
            const today = new Date();
            
            const isSameDate = (d1, d2) => d1.getDate() === d2.getDate() && d1.getMonth() === d2.getMonth() && d1.getFullYear() === d2.getFullYear();
            
            if (type === 'ALL') return true;
            if (type === 'TODAY') return isSameDate(tDate, today);
            if (type === 'YESTERDAY') {
                const yesterday = new Date();
                yesterday.setDate(today.getDate() - 1);
                return isSameDate(tDate, yesterday);
            }
            if (type === 'THIS_MONTH') return tDate.getMonth() === today.getMonth() && tDate.getFullYear() === today.getFullYear();
            if (type === 'CUSTOM') {
                let match = true;
                if (customStart) {
                    const start = new Date(customStart);
                    start.setHours(0,0,0,0);
                    if (tDate < start) match = false;
                }
                if (customEnd) {
                    const end = new Date(customEnd);
                    end.setHours(23,59,59,999);
                    if (tDate > end) match = false;
                }
                return match;
            }
            return true;
        };

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                let encoded = reader.result.toString().replace(/^data:(.*,)?/, '');
                if ((encoded.length % 4) > 0) {
                    encoded += '='.repeat(4 - (encoded.length % 4));
                }
                resolve(encoded);
            };
            reader.onerror = error => reject(error);
        });

                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [notifRef]);
            const hasAutoNavigated = useRef(false);

            useEffect(() => {
                if (tickets.length > 0 && !hasAutoNavigated.current) {
                    if (myTickets.length > 0) {
                        setView('HISTORY');

                    hasAutoNavigated.current = true;

            }, [tickets]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                const errors = {};
                if (!form.app) errors.app = true;
                if (!form.category) errors.category = true;
                if (!form.priority) errors.priority = true;
                if (!form.problem) errors.problem = true;
                if (!form.detail) errors.detail = true;
                if (Object.keys(errors).length > 0) {
                    setInvalidFields(errors);
                    setTimeout(() => setInvalidFields({}), 600);
                    if (!form.app) { showToast('Harap pilih Aplikasi / Modul terlebih dahulu!', 'error'); return; }
                    if (!form.category) { showToast('Harap pilih Kategori terlebih dahulu!', 'error'); return; }
                    if (!form.priority) { showToast('Harap pilih Keutamaan (Priority) terlebih dahulu!', 'error'); return; }
                    showToast('Harap lengkapi Ringkasan dan Detail Masalah!', 'error'); return;
                }
                setIsSubmitting(true);
                try {
                    let attachmentUrl = '';
                    if (file) {
                        const base64 = await toBase64(file);
                        const uploadRes = await apiCall(config, 'uploadFile', {
                            base64, filename: file.name, mimeType: file.type
                        });
                        attachmentUrl = uploadRes.url || uploadRes.downloadUrl;
                    }

                    const newTicket = {
                        reporter: currentUser.name,
                        app: form.app,
                        category: form.category,
                        priority: form.priority,
                        problem: form.problem,
                        detail: form.detail,
                        attachment: attachmentUrl
                    };

                    const savedTicket = await apiCall(config, 'saveTicket', { ticket: newTicket, user: currentUser });
                    setTickets(prev => [savedTicket, ...prev]);

                            <button onClick={() => setIsMobileMenuOpen(false)} className="md:hidden p-2 -mr-2 text-slate-400 hover:text-white transition rounded-lg hover:bg-white/10">

                                <Icon name="clock" size={20} /> <span className="font-medium">{t(lang, 'history')}</span>

                            </button>
                        </nav>
                        <div className="p-4 border-t border-white/10 space-y-1">

                            <button onClick={() => setIsDarkMode(!isDarkMode)} className="w-full flex items-center justify-start gap-3 px-4 py-2 rounded-lg text-sm text-slate-400 hover:bg-primary/20 hover:text-primary transition">
                                {isDarkMode ? <Icon name="sun" size={18} /> : <Icon name="moon" size={18} />}

                    </aside>

                    {/* Content */}
                    <main className="flex-1 flex flex-col h-screen overflow-hidden bg-white dark:bg-slate-900">
                        {/* Header */}
                        <header className="min-h-[4rem] h-auto py-3 md:py-0 md:h-16 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 dark:border-slate-700 flex flex-col md:flex-row items-center justify-between px-4 md:px-6 shrink-0 z-10 gap-3 md:gap-0">
                            <div className="flex items-center w-full md:w-auto gap-3">
                                <div className="flex items-center gap-2 cursor-pointer md:cursor-auto active:opacity-70 transition" onClick={() => setIsMobileMenuOpen(true)} title="Tap to open menu">
                                    <Icon name={view === 'HISTORY' ? 'clock' : 'plus'} size={24} className="text-primary" />

                            </div>
                            <div className="flex flex-wrap md:flex-nowrap items-center gap-3 w-full md:w-auto justify-end">
                                {view === 'HISTORY' && (
                                    <>
                                        <div className="relative flex-1 sm:w-64">

                                            <input type="text" placeholder={t(lang, 'searchTickets')} className="w-full pl-9 pr-4 py-2 rounded-full border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-primary text-sm" value={search} onChange={e => setSearch(e.target.value)} />

                                            <CustomDropdown 
                                                className="w-full sm:w-40"

                                                <span className="self-center font-bold text-slate-400">-</span>

                                                {(customDateStart || customDateEnd) && <button onClick={() => {setCustomDateStart(''); setCustomDateEnd('')}} className="absolute right-3 top-2.5 text-slate-400 hover:text-slate-600"><Icon name="x" size={16} /></button>}

                                            <Icon name="plus" size={16} /> <span>{t(lang, 'createNew')}</span>

                                <div ref={notifRef} className="relative shrink-0">
                                    <div onClick={() => setIsNotifOpen(!isNotifOpen)} className="relative flex items-center justify-center p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 cursor-pointer transition" title={`${notifTickets.length} Notifikasi`}>

                                        {notifTickets.length > 0 && (

                                    {isNotifOpen && (
                                        <div className="absolute right-0 mt-2 w-72 bg-white dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 rounded-xl shadow-none z-50 fade-in">
                                            <div className="p-3 border-b border-slate-100 dark:border-slate-700 font-bold">{t(lang, 'newNotif')}</div>
                                            <div className="max-h-64 overflow-y-auto">
                                                {notifTickets.length > 0 ? (
                                                    notifTickets.map(t => (
                                                        <div key={t.id} onClick={() => { setSelectedTicket(t); setIsNotifOpen(false); }} className="p-3 hover:bg-white dark:hover:bg-slate-700 cursor-pointer border-b border-slate-100 dark:border-slate-700/50 transition">
                                                            <div className="text-sm font-bold text-primary mb-1">{t.id}</div>
                                                            <div className="text-xs text-slate-600 dark:text-slate-300 line-clamp-1 mb-1">{t.status === 'Open' ? 'Tiket berhasil dibuat' : 'Status update: ' + t.status}</div>
                                                            <div className="text-[10px] text-slate-400">{new Date(t.date).toLocaleDateString('id-ID')}</div>
                                                        </div>

                        <div className="flex-1 overflow-y-auto p-4 md:p-6 lg:p-8">

                                {view === 'FORM' && (

                                        <form onSubmit={handleSubmit} noValidate className="space-y-6">
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">

                                                        options={[{ label: t(lang, 'selectApp'), value: '' }, ...settings.apps.map(a => ({ label: a, value: a }))]}

                                                    <CustomDropdown
                                                        options={[{ label: '-- Silahkan Pilih --', value: '' }, ...(settings.categories || ['Bug', 'Task', 'Feature']).map(c => ({ label: c, value: c }))]}
                                                        value={form.category}
                                                        onChange={val => setForm({ ...form, category: val })}
                                                    />
                                                    </div>
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-medium mb-1">{t(lang, 'priority')}</label>
                                                    <div className={invalidFields.priority ? 'field-error' : ''}>
                                                    <CustomDropdown
                                                        options={[{ label: '-- Silahkan Pilih --', value: '' }, ...settings.priorities.map(p => ({ label: p, value: p }))]}
                                                        value={form.priority}
                                                        onChange={val => setForm({ ...form, priority: val })}
                                                    />
                                                    </div>
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium mb-1">Ringkasan Masalah</label>
                                                <input required type="text" className={`w-full px-4 py-2.5 rounded-xl border-2 border-slate-300 dark:border-slate-600 bg-transparent focus:ring-2 focus:ring-primary outline-none ${invalidFields.problem ? 'field-error' : ''}`} value={form.problem} onChange={e => setForm({ ...form, problem: e.target.value })} placeholder="Singkat dan jelas" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium mb-1">Detail Lengkap</label>
                                                <textarea required rows="5" className={`w-full px-4 py-2.5 rounded-xl border-2 border-slate-300 dark:border-slate-600 bg-transparent focus:ring-2 focus:ring-primary outline-none ${invalidFields.detail ? 'field-error' : ''}`} value={form.detail} onChange={e => setForm({ ...form, detail: e.target.value })} placeholder="Jelaskan langkah-langkah, ekspektasi, dan hasil aktual..."></textarea>
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium mb-1">{t(lang, 'attachment')}</label>
                                                <input type="file" accept="image/*,video/*" onChange={e => setFile(e.target.files[0])} className="w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-primary hover:file:bg-blue-100 transition cursor-pointer" />
                                            </div>
                                            <div className="pt-4 border-t-2 border-slate-200 dark:border-slate-700 flex justify-end">
                                                <button type="submit" disabled={isSubmitting} className="bg-primary hover:bg-primaryHover text-white px-6 py-2.5 rounded-xl font-medium shadow-none  transition-all flex items-center gap-2">
                                                    {isSubmitting ? 'Mengirim...' : <><Icon name="check" size={18} /> {t(lang, 'submitTicket')}</>}
                                                </button>
                                            </div>
                                        </form>
                                    </div>
                                )}

                                {view === 'HISTORY' && (
                                    <div className="fade-in space-y-6">

                                        {myTickets.length === 0 ? (
                                            <div className="text-center p-12 bg-white dark:bg-slate-800 rounded-2xl border-2 border-slate-200 dark:border-slate-700">
                                                <Icon name="file-text" size={48} className="mx-auto text-slate-300 mb-4" />
                                                <p className="text-slate-500 mb-4">{t(lang, 'noTickets')}</p>
                                                <button onClick={() => setView('FORM')} className="bg-primary/10 text-primary hover:bg-primary hover:text-white px-6 py-2.5 rounded-xl font-medium transition mx-auto inline-flex items-center gap-2">
                                                    {t(lang, 'createNow')}
                                                </button>
                                            </div>
                                        ) : (
                                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                                                {myTickets.filter(t => t.id.toLowerCase().includes(search.toLowerCase()) || t.problem.toLowerCase().includes(search.toLowerCase()) || t.app.toLowerCase().includes(search.toLowerCase())).map(t => (
                                                    <div key={t.id} onClick={() => setSelectedTicket(t)} className="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 shadow-none transition cursor-pointer flex flex-col h-full">
                                                        <div className="flex justify-between items-start mb-3">
                                                            <div className="flex items-center gap-2 flex-wrap">
                                                                <span className="text-xs font-bold text-primary">{t.id}</span>
                                                                <span className="text-[10px] px-2 py-0.5 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center gap-1">
                                                                    <Icon name={t.category === 'Bug' ? 'bug' : t.category === 'Feature' ? 'star' : 'check-circle'} size={10} className={t.category === 'Bug' ? 'text-red-500' : t.category === 'Feature' ? 'text-green-500' : 'text-blue-500'} />
                                                                    {t.category || 'Bug'}
                                                                </span>
                                                                <span className="text-[10px] px-2 py-0.5 rounded-full bg-[#E6F2FF] dark:bg-[#183A62]">{t.app}</span>
                                                            </div>
                                                            <span className={`px-2 py-0.5 rounded text-[10px] font-semibold ${t.status === 'Open' ? 'bg-blue-100 text-blue-700' : t.status === 'Done' ? 'bg-primary/20 text-primary' : 'bg-amber-100 text-amber-700'}`}>
                                                                {t.status}
                                                            </span>
                                                        </div>
                                                        <p className="font-medium text-sm mb-3 line-clamp-2 flex-1">{t.problem}</p>
                                                        <div className="flex justify-between items-center mt-auto">
                                                            {t.assignee ? (
                                                                <div className="flex items-center gap-1 text-xs text-primary">
                                                                    <Icon name="users" size={14} /> <span>{t.assignee}</span>
                                                                </div>
                                                            ) : <div />}
                                                            <div className="flex items-center gap-1 text-xs text-slate-500">
                                                                <div className={`w-2 h-2 rounded-full ${t.priority === 'Critical' ? 'bg-red-500' : t.priority === 'High' ? 'bg-amber-500' : 'bg-blue-400'}`}></div>
                                                                <span>{t.priority}</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}

                                    </div>

                            </div>
                        </div>
                    </main>
                    <TicketDetailModal
                        ticket={selectedTicket}
                        onClose={() => setSelectedTicket(null)}
                        currentUser={currentUser}
                        users={users}
                        settings={settings}
                        showToast={showToast} lang={lang} setLang={setLang} t={t}
                        onUpdate={async (ticketId, updateData) => {
                            const payload = {
                                ticket: { id: ticketId, ...updateData },
                                user: currentUser
                            };
                            const updated = await apiCall(config, 'saveTicket', payload);
                            setTickets(tickets.map(x => x.id === ticketId ? updated : x));
                            showToast('Tiket berhasil diupdate!');
                        }}
                    />
                </div>
            );
        };

        // ADMIN DASHBOARD
        const AdminDashboard = ({ config, currentUser, users, setUsers, tickets, setTickets, settings, setSettings, loadData, showToast, isDarkMode, setIsDarkMode, handleLogout, apiCall, TICKET_STATUSES, hashPassword, lang, setLang, t }) => {
            const [view, setView] = useState('BOARD'); // BOARD, USERS
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [search, setSearch] = useState('');
            const [dateFilterType, setDateFilterType] = useState('ALL');
            const [customDateStart, setCustomDateStart] = useState('');
            const [customDateEnd, setCustomDateEnd] = useState('');
            const [selectedTicket, setSelectedTicket] = useState(null);

            // User management
            const [userModalOpen, setUserModalOpen] = useState(false);
            const [userForm, setUserForm] = useState({ id: null, name: '', username: '', password: '', role: 'User', status: 'Active' });
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [form, setForm] = useState({ app: '', category: '', priority: '', problem: '', detail: '' });
            const [file, setFile] = useState(null);
            const [invalidFields, setInvalidFields] = useState({});

            // Notification
            const [isNotifOpen, setIsNotifOpen] = useState(false);
            const notifRef = useRef(null);

            useEffect(() => {
                function handleClickOutside(event) {
                    if (notifRef.current && !notifRef.current.contains(event.target)) {
                        setIsNotifOpen(false);
                    }
                }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [notifRef]);

            // Kanban drag drop
            const handleDragStart = (e, id) => { e.dataTransfer.setData('ticketId', id); };
            const handleDragOver = (e) => { e.preventDefault(); };
            const handleDrop = async (e, status) => {
                e.preventDefault();
                const tId = e.dataTransfer.getData('ticketId');
                const t = tickets.find(x => x.id === tId);
                if (t && t.status !== status) {
                    try {
                        const updated = await apiCall(config, 'saveTicket', { ticket: { id: tId, status: status }, user: currentUser });
                        setTickets(tickets.map(x => x.id === tId ? updated : x));
                        showToast('Status diperbarui!');
                    } catch (err) {
                        showToast(err.message, 'error');
                    }
                }
            };

            const handleSaveUser = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                try {
                    const data = { ...userForm };
                    if (data.password) data.password = hashPassword(data.password);
                    const savedUser = await apiCall(config, 'saveUser', { user: data });
                    setUsers(prev => {
                        const exists = prev.find(u => u.id === savedUser.id);
                        if (exists) return prev.map(u => u.id === savedUser.id ? savedUser : u);
                        return [...prev, savedUser];
                    });
                    showToast('Pengguna disimpan!', 'success');
                    setUserModalOpen(false);
                } catch (error) {
                    showToast(error.message, 'error');
                } finally {
                    setIsSubmitting(false);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const errors = {};
                if (!form.app) errors.app = true;
                if (!form.category) errors.category = true;
                if (!form.priority) errors.priority = true;
                if (!form.problem) errors.problem = true;
                if (!form.detail) errors.detail = true;
                if (Object.keys(errors).length > 0) {
                    setInvalidFields(errors);
                    setTimeout(() => setInvalidFields({}), 600);
                    if (!form.app) { showToast('Harap pilih Aplikasi / Modul terlebih dahulu!', 'error'); return; }
                    if (!form.category) { showToast('Harap pilih Kategori terlebih dahulu!', 'error'); return; }
                    if (!form.priority) { showToast('Harap pilih Keutamaan (Priority) terlebih dahulu!', 'error'); return; }
                    showToast('Harap lengkapi Ringkasan dan Detail Masalah!', 'error'); return;
                }
                setIsSubmitting(true);
                try {
                    let attachmentUrl = '';
                    if (file) {
                        const base64 = await toBase64(file);
                        const uploadRes = await apiCall(config, 'uploadFile', {
                            base64, filename: file.name, mimeType: file.type
                        });
                        attachmentUrl = uploadRes.url || uploadRes.downloadUrl;
                    }

                    const newTicket = {
                        reporter: currentUser.name,
                        app: form.app,
                        category: form.category,
                        priority: form.priority,
                        problem: form.problem,
                        detail: form.detail,
                        attachment: attachmentUrl
                    };

                    const savedTicket = await apiCall(config, 'saveTicket', { ticket: newTicket, user: currentUser });
                    setTickets(prev => [savedTicket, ...prev]);
                    showToast('Tiket berhasil dibuat!', 'success');
                    setForm({ app: '', category: '', priority: '', problem: '', detail: '' });
                    setFile(null);
                    setView('BOARD');
                } catch (error) {
                    showToast(error.message, 'error');
                } finally {
                    setIsSubmitting(false);
                }
            };

            const roleFilteredTickets = useMemo(() => {
                return (currentUser.role === 'Tim IT' ? tickets.filter(t => t.assignee === currentUser.name) : [...tickets])
                    .filter(t => filterByDateType(t.date, dateFilterType, customDateStart, customDateEnd))
                    .sort((a, b) => {
                        const dateA = new Date(a.date);
                        const dateB = new Date(b.date);
                        return (isNaN(dateB) ? 0 : dateB) - (isNaN(dateA) ? 0 : dateA);
                    });
            }, [tickets, currentUser.role, currentUser.name, dateFilterType, customDateStart, customDateEnd]);

            const debouncedSearch = useDebounce(search, 250);
            const filteredTickets = useMemo(() => {
                const s = debouncedSearch.toLowerCase();
                return roleFilteredTickets.filter(t => (t.id || '').toLowerCase().includes(s) || (t.problem || '').toLowerCase().includes(s) || (t.app || '').toLowerCase().includes(s));
            }, [roleFilteredTickets, debouncedSearch]);

            const notifTickets = useMemo(() => roleFilteredTickets.filter(t => t.status !== 'Done'), [roleFilteredTickets]);

            return (
                <div className="flex h-screen overflow-hidden relative">
                    {/* Mobile Sidebar Overlay */}
                    <div className={`md:hidden fixed inset-0 bg-black/50 z-20 transition-opacity duration-300 ${isMobileMenuOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`} onClick={() => setIsMobileMenuOpen(false)}></div>
                    
                    {/* Sidebar */}

                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Modals */}
                    <TicketDetailModal
                        ticket={selectedTicket}
                        onClose={() => setSelectedTicket(null)}
                        currentUser={currentUser}
                        users={users}
                        settings={settings}
                        showToast={showToast} lang={lang} setLang={setLang} t={t}
                        onUpdate={async (ticketId, updateData) => {
                            const payload = {
                                ticket: { id: ticketId, ...updateData },
                                user: currentUser
                            };
                            const updated = await apiCall(config, 'saveTicket', payload);
                            setTickets(tickets.map(x => x.id === ticketId ? updated : x));
                            showToast('Tiket berhasil diupdate!');
                        }}
                    />

                    {userModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4 fade-in">
                            <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-none border border-slate-200 dark:border-slate-700 w-full max-w-md">
                                <div className="flex justify-between items-center p-6 border-b-2 border-slate-200 dark:border-slate-700 bg-[#E6F2FF] dark:bg-[#183A62] rounded-t-2xl">
                                    <h3 className="text-xl font-bold">{userForm.id ? 'Edit User' : t(lang, 'addUser')}</h3>
                                    <button onClick={() => setUserModalOpen(false)} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full transition"><Icon name="x" /></button>
                                </div>
                                <form noValidate onSubmit={(e) => {
                                    e.preventDefault();
                                    if (!userForm.name || !userForm.username || !userForm.role) return showToast('Harap isi semua kolom wajib!', 'error');
                                    handleSaveUser(e);
                                }} className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium mb-1">Nama Lengkap</label>
                                        <input required type="text" className="w-full px-3 py-2 rounded-lg border-2 border-slate-300 dark:border-slate-600 bg-transparent focus:ring-2 focus:ring-primary outline-none" value={userForm.name} onChange={e => setUserForm({ ...userForm, name: e.target.value })} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium mb-1">Username</label>
                                        <input required type="text" className="w-full px-3 py-2 rounded-lg border-2 border-slate-300 dark:border-slate-600 bg-transparent focus:ring-2 focus:ring-primary outline-none" value={userForm.username} onChange={e => setUserForm({ ...userForm, username: e.target.value })} disabled={userForm.username === 'admin'} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium mb-1">{userForm.id ? 'Password Baru (Kosongkan jika tidak diubah)' : 'Password'}</label>
                                        <input required={!userForm.id} type="password" className="w-full px-3 py-2 rounded-lg border-2 border-slate-300 dark:border-slate-600 bg-transparent focus:ring-2 focus:ring-primary outline-none" value={userForm.password} onChange={e => setUserForm({ ...userForm, password: e.target.value })} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium mb-1">Role</label>
                                            <CustomDropdown options={[{ label: 'User', value: 'User' }, { label: 'Tim IT', value: 'Tim IT' }, { label: 'Admin', value: 'Admin' }]} value={userForm.role} onChange={val => setUserForm({ ...userForm, role: val })} disabled={userForm.username === 'admin'} />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1">Status</label>
                                            <CustomDropdown options={[{ label: 'Active', value: 'Active' }, { label: 'Inactive', value: 'Inactive' }]} value={userForm.status} onChange={val => setUserForm({ ...userForm, status: val })} disabled={userForm.username === 'admin'} />
                                        </div>
                                    </div>
                                    <div className="pt-4 flex justify-end">
                                        <button type="submit" disabled={isSubmitting} className="bg-primary hover:bg-primaryHover text-white px-6 py-2.5 rounded-xl font-medium shadow-none transition-all flex items-center gap-2">
                                            {isSubmitting ? 'Menyimpan...' : 'Simpan'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };



        function App() {
            // Theme State
            const [isDarkMode, setIsDarkMode] = useState(() => {
                const saved = localStorage.getItem('theme');
                if (saved) return saved === 'dark';
                return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            });

            useEffect(() => {
                localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            // App States
            const [appState, setAppState] = useState('LOADING'); // LOADING, SETUP, LOGIN, ADMIN_DASHBOARD, USER_DASHBOARD
            const [config, setConfig] = useState({ api: '', sheetId: '', folderId: '' });
            const [currentUser, setCurrentUser] = useState(null);
            const [lang, setLang] = useState('MY');
            const [users, setUsers] = useState([]);
            const [tickets, setTickets] = useState([]);
            const [settings, setSettings] = useState({ apps: [], priorities: [], statuses: [] });
            const [isLoading, setIsLoading] = useState(false);
            const [toast, setToast] = useState(null);

            const showToast = (message, type = 'success') => {
                setToast({ message, type, id: Date.now() });
                setTimeout(() => setToast(null), 3000);
            };

            // Init from URL or LocalStorage
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const pApi = params.get('api');
                const pSheet = params.get('sheetId');
                const pFolder = params.get('folderId');

                const savedConfig = JSON.parse(localStorage.getItem('appConfig') || '{}');

                let finalConfig = {
                    api: HARDCODED_API_URL || pApi || savedConfig.api || '',
                    sheetId: DEFAULT_SHEET_ID || pSheet || savedConfig.sheetId || '',
                    folderId: DEFAULT_FOLDER_ID || pFolder || savedConfig.folderId || ''
                };

                setConfig(finalConfig);

                if (finalConfig.api && finalConfig.sheetId && finalConfig.folderId) {
                    localStorage.setItem('appConfig', JSON.stringify(finalConfig));

                    const savedUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
                    if (savedUser) {
                        setCurrentUser(savedUser);
                        setAppState(savedUser.role === 'Admin' || savedUser.role === 'Tim IT' ? 'ADMIN_DASHBOARD' : 'USER_DASHBOARD');
                    } else {
                        setAppState('LOGIN');
                    }
                } else {
                    setAppState('SETUP');
                }
            }, []);

            const handleLogout = () => {
                localStorage.removeItem('currentUser');
                setCurrentUser(null);
                setAppState('LOGIN');
                showToast("Berhasil logout", "success");
            };

            const loadData = async () => {
                setIsLoading(true);
                try {
                    const settingsData = await apiCall(config, 'getSettings');
                    setSettings(settingsData);

                    if (currentUser.role === 'Admin' || currentUser.role === 'Tim IT') {
                        const usersData = await apiCall(config, 'getUsers');
                        setUsers(usersData);
                    }
                    const ticketsData = await apiCall(config, 'getTickets');
                    setTickets(ticketsData);
                } catch (error) {
                    showToast(error.message, 'error');
                } finally {
                    setIsLoading(false);
                }
            };

            useEffect(() => {
                let interval;
                if (appState === 'ADMIN_DASHBOARD' || appState === 'USER_DASHBOARD') {
                    loadData();
                    // Auto-refresh tickets every 60 seconds untuk menghemat resource
                    interval = setInterval(() => {
                        apiCall(config, 'getTickets').then(data => {
                            setTickets(data);
                        }).catch(e => console.log('Auto-refresh silent err', e));
                    }, 60000);
                }
                return () => { if (interval) clearInterval(interval); };
            }, [appState]);

            // TOAST RENDERER
            const renderToast = () => {
                if (!toast) return null;
                return (
                    <div className="fixed bottom-6 right-6 z-50 fade-in">
                        <div className={`px-4 py-3 rounded-xl shadow-none border flex items-center gap-3 ${toast.type === 'error' ? 'bg-red-50 dark:bg-red-900/30 border-red-200 dark:border-red-800 text-red-700 dark:text-red-400' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200'}`}>
                            {toast.type === 'error' ? <div className="w-2 h-2 rounded-full bg-red-500"></div> : <div className="w-2 h-2 rounded-full bg-primary"></div>}
                            <span className="font-medium text-sm">{toast.message}</span>
                        </div>
                    </div>
                );
            };

            // Loading state overlay
            if (isLoading && !currentUser) {
                return <div className="h-screen w-full flex items-center justify-center bg-white dark:bg-slate-900 text-primary"><div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-primary"></div></div>;
            }

            return (
                <div className="text-slate-800 dark:text-slate-200 font-sans h-screen w-full overflow-hidden">
                    {appState === 'SETUP' && <SetupScreen config={config} setConfig={setConfig} setAppState={setAppState} showToast={showToast} lang={lang} setLang={setLang} t={t} apiCall={apiCall} />}
                    {appState === 'LOGIN' && <LoginScreen config={config} setCurrentUser={setCurrentUser} setAppState={setAppState} showToast={showToast} lang={lang} setLang={setLang} t={t} hashPassword={hashPassword} apiCall={apiCall} isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} />}
                    {appState === 'USER_DASHBOARD' && <UserDashboard config={config} currentUser={currentUser} users={users} tickets={tickets} setTickets={setTickets} settings={settings} loadData={loadData} showToast={showToast} lang={lang} setLang={setLang} t={t} isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} handleLogout={handleLogout} apiCall={apiCall} PRIORITIES={PRIORITIES} />}
                    {appState === 'ADMIN_DASHBOARD' && <AdminDashboard config={config} currentUser={currentUser} users={users} setUsers={setUsers} tickets={tickets} setTickets={setTickets} settings={settings} setSettings={setSettings} loadData={loadData} showToast={showToast} lang={lang} setLang={setLang} t={t} isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} handleLogout={handleLogout} apiCall={apiCall} TICKET_STATUSES={TICKET_STATUSES} hashPassword={hashPassword} />}

                    {/* Global loading indicator overlay */}
                    {isLoading && currentUser && (
                        <div className="fixed top-4 right-4 z-50 bg-white/80 dark:bg-slate-800/80 backdrop-blur px-3 py-1.5 rounded-full shadow-none border border-slate-200 dark:border-slate-700 flex items-center gap-2 text-xs font-medium fade-in">
                            <div className="w-3 h-3 border-2 border-primary border-t-transparent rounded-full animate-spin"></div> Syncing...
                        </div>
                    )}

                    {renderToast()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
