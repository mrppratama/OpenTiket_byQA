        const HARDCODED_API_URL = 'https://script.google.com/macros/s/AKfycbyBzEfRmSNbzseN5L3TNPBSMUoidx0CI0WrI7edT2uhlYIxMppMdCVSTm89AAsTwV9j1w/exec'; // Paste URL Web App di antara tanda kutip tunggal ini

        function hashPassword(password) {
            return CryptoJS.SHA256(password).toString();

        // Custom API fetcher
        async function apiCall(config, action, data = {}) {
            const apiUrl = HARDCODED_API_URL || config.api;
            if (!apiUrl) throw new Error("API URL is not configured");

            const payload = {
                action,
                sheetId: DEFAULT_SHEET_ID || config.sheetId,
                folderId: DEFAULT_FOLDER_ID || config.folderId,
                ...data
            };

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (!result.success) throw new Error(result.message);
                return result.data;
            } catch (error) {
                console.error("API Error:", error);
                throw new Error("Koneksi gagal: " + error.message + ". (Cek Console F12 untuk detailnya)");
            }
        }

                    setAppState('LOGIN');

                    if (wrapperRef.current && !wrapperRef.current.contains(event.target)) setIsOpen(false);
                }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [wrapperRef]);
            const options = [{value: 'ID', label: 'Indonesia'}, {value: 'MY', label: 'Malaysia'}, {value: 'EN', label: 'English'}];
            
            const btnClass = variant === 'dark' 
                ? "w-full flex items-center justify-center md:justify-start gap-3 px-2 md:px-4 py-2 mt-1 rounded-lg text-sm text-slate-400 hover:bg-white/5 cursor-pointer transition"
                : "w-full flex items-center justify-center md:justify-start gap-3 px-2 md:px-4 py-2 mt-1 rounded-lg text-sm text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 cursor-pointer transition";

            return (
                <div ref={wrapperRef} className="relative w-full">
                    <div onClick={() => setIsOpen(!isOpen)} className={btnClass}>
                        <Icon name="globe" size={18} />
                        <span className="hidden md:block flex-1 text-left">{options.find(o => o.value === lang)?.label}</span>
                        <Icon name="chevron-down" size={14} className={`hidden md:block transition-transform ${isOpen ? 'rotate-180' : ''}`} />
                    </div>
                    {isOpen && (
                        <ul className="absolute z-50 bottom-full left-0 mb-2 w-full min-w-[150px] bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-xl overflow-hidden py-1 fade-in">
                            {options.map(opt => (
                                <li 
                                    key={opt.value}
                                    className={`px-4 py-2 text-sm cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700 ${lang === opt.value ? 'text-primary font-bold bg-primary/5 dark:bg-primary/10' : 'text-slate-600 dark:text-slate-300'}`}
                                    onClick={() => { setLang(opt.value); setIsOpen(false); }}
                                >
                                    {opt.label}
                                </li>
                            ))}
                        </ul>
                    )}
                </div>
            );
        };

        const CustomDropdown = ({ options, value, onChange, label, disabled = false, className = "" }) => {
            const [isOpen, setIsOpen] = useState(false);
            const wrapperRef = useRef(null);

            useEffect(() => {
                function handleClickOutside(event) {
                    if (wrapperRef.current && !wrapperRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [wrapperRef]);

            return (
                <div ref={wrapperRef} className={`relative ${className}`}>
                    {label && <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">{label}</label>}
                    <div 
                        className={`w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-transparent flex justify-between items-center cursor-pointer transition-colors ${disabled ? 'opacity-50 cursor-not-allowed' : 'hover:border-primary'} ${isOpen ? 'border-primary ring-2 ring-primary/20' : ''}`}
                        onClick={() => !disabled && setIsOpen(!isOpen)}
                    >
                        <span className="truncate">{value || 'Pilih...'}</span>
                        <Icon name="chevron-down" size={16} className={`transition-transform text-slate-400 ${isOpen ? 'rotate-180 text-primary' : ''}`} />
                    </div>
                    {isOpen && !disabled && (
                        <ul className="absolute z-50 w-full mt-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-xl max-h-60 overflow-y-auto py-1 fade-in">
                            {options.map((opt, i) => {
                                const optValue = typeof opt === 'object' ? opt.value : opt;
                                const optLabel = typeof opt === 'object' ? opt.label : opt;
                                const isSelected = value === optValue;
                                return (
                                    <li 
                                        key={i}
                                        className={`px-4 py-2.5 cursor-pointer text-sm flex items-center justify-between transition-colors ${isSelected ? 'bg-primary/10 text-primary font-medium' : 'hover:bg-slate-50 dark:hover:bg-slate-700/50 text-slate-700 dark:text-slate-300'}`}
                                        onClick={() => {
                                            onChange(optValue);
                                            setIsOpen(false);
                                        }}
                                    >
                                        <span className="truncate">{optLabel}</span>
                                        {isSelected && <Icon name="check" size={16} className="text-primary flex-shrink-0" />}
                                    </li>
                                );
                            })}
                        </ul>
                    )}
                </div>
            );
        };

const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                let encoded = reader.result.toString().replace(/^data:(.*,)?/, '');
                if ((encoded.length % 4) > 0) {
                    encoded += '='.repeat(4 - (encoded.length % 4));
                }
                resolve(encoded);
            };
            reader.onerror = error => reject(error);
        });

        // Components for Dashboards
        const TicketDetailModal = ({ ticket, onClose, currentUser, users = [], onUpdate, settings = { statuses: [], priorities: [] }, TICKET_STATUSES, showToast, lang, t }) => {
            const [editForm, setEditForm] = useState({ status: '', priority: '', assignee: '', deadline: '' });
            const [isSaving, setIsSaving] = useState(false);

            useEffect(() => {
                if (ticket) {
                    setEditForm({
                        status: ticket.status || 'Open',
                        priority: ticket.priority || 'Medium',

                    });
                }

            if (!ticket) return null;

            const handleSave = async () => {
                setIsSaving(true);

                    await onUpdate(ticket.id, editForm);

                    setIsSaving(false);

                                    <button onClick={() => { navigator.clipboard.writeText(ticket.id); if(showToast) showToast('ID Tiket disalin!', 'success'); else alert('ID Tiket disalin!'); }} className="text-slate-400 hover:text-primary transition" title="Copy ID">

                                        onChange={val => setEditForm({ ...editForm, status: val })}

                                ) : (
                                    <span className={`inline-block px-3 py-1 rounded-full text-xs font-medium mt-1 ${ticket.status === 'Open' ? 'bg-indigo-100 text-indigo-700' : ticket.status === 'Done' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}`}>
                                        {ticket.status}
                                    </span>
                                )}
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full transition"><Icon name="x" /></button>
                        </div>
                        <div className="p-6 grid grid-cols-1 lg:grid-cols-3 gap-6 flex-1">
                            <div className="lg:col-span-2 space-y-6">

                                    <p className="text-lg font-medium">{ticket.problem}</p>
                                </div>
                                <div>
                                    <h4 className="text-sm font-semibold text-slate-500 mb-1 uppercase tracking-wider">Detail Lengkap</h4>
                                    <div className="bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl text-sm whitespace-pre-wrap">
                                        {ticket.detail}
                                    </div>
                                </div>

                                {ticket.attachment && (
                                    <div>

                                            {isImage ? (
                                                <img src={ticket.attachment} alt="Lampiran" className="max-h-64 object-contain rounded-lg" />

                                    <div>
                                        <span className="text-slate-500 block mb-1">Reporter</span>
                                        <span className="font-medium">{ticket.reporter}</span>

                                    <div>
                                        <span className="text-slate-500 block mb-1">Aplikasi</span>
                                        <span className="font-medium">{ticket.app}</span>

                                    {currentUser?.role === 'Admin' || currentUser?.role === 'Tim IT' ? (
                                        <>
                                            <div className="col-span-2">

                                                <label className="text-slate-500 block mb-1">Deadline</label>
                                                <input type="date" className="w-full px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent outline-none" value={editForm.deadline} onChange={e => setEditForm({ ...editForm, deadline: e.target.value })} />

                                            <div className="col-span-2 pt-2">
                                                <button onClick={handleSave} disabled={isSaving} className="w-full bg-primary hover:bg-primaryHover text-white py-2 rounded-lg font-medium transition flex items-center justify-center gap-2">
                                                    {isSaving ? 'Menyimpan...' : <><Icon name="check" size={16} /> {t(lang, 'updateTicket')}</>}

                                        {ticket.timeline && ticket.timeline.length > 0 ? ticket.timeline.map((tl, i) => (
                                            <div key={i} className="flex gap-3 text-sm">
                                                <div className="flex flex-col items-center">
                                                    <div className="w-2.5 h-2.5 bg-primary rounded-full mt-1.5"></div>
                                                    {i !== ticket.timeline.length - 1 && <div className="w-0.5 h-full bg-slate-200 dark:bg-slate-700 my-1"></div>}
                                                </div>
                                                <div className="pb-3">
                                                    <p className="font-medium">{tl.activity}</p>
                                                    <p className="text-xs text-slate-500">{new Date(tl.date).toLocaleString('id-ID')} oleh {tl.by}</p>
                                                    {tl.notes && <p className="text-xs mt-1 bg-slate-100 dark:bg-slate-800 p-1.5 rounded text-slate-600 dark:text-slate-400">{tl.notes}</p>}

        // USER DASHBOARD
        const UserDashboard = ({ config, currentUser, users, tickets, setTickets, settings, loadData, showToast, isDarkMode, setIsDarkMode, handleLogout, apiCall, PRIORITIES, lang, setLang, t }) => {

            const [isSubmitting, setIsSubmitting] = useState(false);
            const [form, setForm] = useState({ app: '', priority: 'Medium', problem: '', detail: '' });
            const [file, setFile] = useState(null);

            const [search, setSearch] = useState('');
            const [selectedTicket, setSelectedTicket] = useState(null);

            const myTickets = tickets.filter(t => t.reporter === currentUser.name);
            const notifTickets = myTickets.filter(t => t.status !== 'Open' && t.status !== 'Done');
            const [isNotifOpen, setIsNotifOpen] = useState(false);
            const notifRef = useRef(null);

            useEffect(() => {
                function handleClickOutside(event) {
                    if (notifRef.current && !notifRef.current.contains(event.target)) {
                        setIsNotifOpen(false);
                    }
                }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [notifRef]);
            const hasAutoNavigated = useRef(false);

            useEffect(() => {
                if (tickets.length > 0 && !hasAutoNavigated.current) {
                    if (myTickets.length > 0) {
                        setView('HISTORY');
                    }
                    hasAutoNavigated.current = true;
                }
            }, [tickets]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!form.app) {
                    showToast('Silakan pilih Aplikasi!', 'error');
                    return;
                }
                setIsSubmitting(true);
                try {
                    let attachmentUrl = '';
                    if (file) {
                        const base64 = await toBase64(file);
                        const uploadRes = await apiCall(config, 'uploadFile', {
                            base64, filename: file.name, mimeType: file.type
                        });
                        attachmentUrl = uploadRes.url || uploadRes.downloadUrl;
                    }

                    const newTicket = {
                        reporter: currentUser.name,
                        app: form.app,
                        priority: form.priority,
                        problem: form.problem,
                        detail: form.detail,
                        attachment: attachmentUrl
                    };

                    await apiCall(config, 'saveTicket', { ticket: newTicket, user: currentUser });
                    showToast('Tiket berhasil dibuat!', 'success');
                    setForm({ app: '', priority: 'Medium', problem: '', detail: '' });
                    setFile(null);
                    loadData();
                    setView('HISTORY');

                    showToast(error.message, 'error');
                } finally {
                    setIsSubmitting(false);
                }

                            <Icon name="shield-check" className="text-primary mr-2" size={24} />

                        <div className="p-4 flex-1 space-y-1">
                            <button onClick={() => setView('HISTORY')} className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition ${view === 'HISTORY' ? 'bg-indigo-50 text-primary dark:bg-indigo-900/30' : 'hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300'}`}>
                                <Icon name="layout-dashboard" size={18} /> {t(lang, 'history')}
                            </button>

<LanguageDropdown lang={lang} setLang={setLang} variant="light" />

                                {isDarkMode ? <><Icon name="sun" size={18} /> Terang</> : <><Icon name="moon" size={18} /> Gelap</>}

                    </aside>

                    {/* Content */}
                    <main className="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50 dark:bg-slate-900">
                        {/* Header */}

                            <div className="flex items-center gap-4 w-full sm:w-auto justify-end">
                                {view === 'HISTORY' && (

                                        <input type="text" placeholder={t(lang, 'searchTickets')} className="w-full pl-9 pr-4 py-2 rounded-full border border-slate-200 dark:border-slate-700 bg-slate-100 dark:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-primary text-sm" value={search} onChange={e => setSearch(e.target.value)} />

                                    <form onSubmit={handleSubmit} className="space-y-6">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div>
                                                <label className="block text-sm font-medium mb-1">{t(lang, 'appModule')}</label>

                                                    {settings.priorities.map(p => <option key={p} value={p}>{p}</option>)}

                                            <Icon name="plus" size={16} /> {t(lang, 'createNew')}
                                        </button>
                                    </div>
                                    {myTickets.length === 0 ? (
                                        <div className="text-center p-12 bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700">
                                            <Icon name="file-text" size={48} className="mx-auto text-slate-300 mb-4" />
                                            <p className="text-slate-500 mb-4">{t(lang, 'noTickets')}</p>
                                            <button onClick={() => setView('FORM')} className="bg-primary/10 text-primary hover:bg-primary hover:text-white px-6 py-2.5 rounded-xl font-medium transition mx-auto inline-flex items-center gap-2">
                                                {t(lang, 'createNow')}
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="grid gap-4">
                                            {myTickets.filter(t => t.id.toLowerCase().includes(search.toLowerCase()) || t.problem.toLowerCase().includes(search.toLowerCase()) || t.app.toLowerCase().includes(search.toLowerCase())).map(t => (
                                                <div key={t.id} onClick={() => setSelectedTicket(t)} className="bg-white dark:bg-slate-800 p-5 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-md transition cursor-pointer flex flex-col md:flex-row md:items-center justify-between gap-4">
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-2 mb-1">
                                                            <span className="font-bold text-primary">{t.id}</span>
                                                            <span className="text-xs px-2 py-0.5 rounded-full bg-slate-100 dark:bg-slate-700">{t.app}</span>
                                                        </div>
                                                        <h3 className="font-medium text-lg mb-1 line-clamp-1">{t.problem}</h3>
                                                        <div className="text-sm text-slate-500 flex flex-wrap gap-4 mt-2">
                                                            <div className="flex items-center gap-1"><Icon name="clock" size={14} /> {new Date(t.date).toLocaleDateString('id-ID')}</div>

                                                            {t.assignee && <div className="flex items-center gap-1 text-primary"><Icon name="users" size={14} /> Assignee: {t.assignee}</div>}
                                                            {t.deadline && <div className="flex items-center gap-1"><Icon name="clock" size={14} /> Deadline: {new Date(t.deadline).toLocaleDateString('id-ID')}</div>}

                        users={users}

                            const payload = {
                                ticket: { id: ticketId, ...updateData },
                                user: currentUser

                            const updated = await apiCall(config, 'saveTicket', payload);

            const [userModalOpen, setUserModalOpen] = useState(false);
            const [userForm, setUserForm] = useState({ id: null, name: '', username: '', password: '', role: 'User', status: 'Active' });
            const [isSubmitting, setIsSubmitting] = useState(false);
            
            // Notification
            const [isNotifOpen, setIsNotifOpen] = useState(false);
            const notifRef = useRef(null);

            useEffect(() => {
                function handleClickOutside(event) {
                    if (notifRef.current && !notifRef.current.contains(event.target)) {
                        setIsNotifOpen(false);
                    }
                }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [notifRef]);

            // Kanban drag drop
            const handleDragStart = (e, id) => { e.dataTransfer.setData('ticketId', id); };
            const handleDragOver = (e) => { e.preventDefault(); };
            const handleDrop = async (e, status) => {
                e.preventDefault();
                const tId = e.dataTransfer.getData('ticketId');
                const t = tickets.find(x => x.id === tId);
                if (t && t.status !== status) {
                    try {
                        const updated = await apiCall(config, 'saveTicket', { ticket: { id: tId, status: status }, user: currentUser });
                        setTickets(tickets.map(x => x.id === tId ? updated : x));
                        showToast('Status diperbarui!');
                    } catch (err) {
                        showToast(err.message, 'error');
                    }
                }
            };

            const handleSaveUser = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                try {
                    const data = { ...userForm };
                    if (data.password) data.password = hashPassword(data.password);
                    await apiCall(config, 'saveUser', { user: data });
                    showToast('Pengguna disimpan!', 'success');
                    setUserModalOpen(false);
                    loadData();
                } catch (error) {
                    showToast(error.message, 'error');
                } finally {
                    setIsSubmitting(false);
                }

            const roleFilteredTickets = currentUser.role === 'Tim IT' ? tickets.filter(t => t.assignee === currentUser.name) : tickets;

            const notifTickets = roleFilteredTickets.filter(t => t.status === 'Open');

            return (
                <div className="flex h-screen overflow-hidden">

                            <div className="w-8 h-8 bg-primary rounded-lg flex items-center justify-center shrink-0 shadow-lg shadow-primary/50 text-white">
                                <Icon name="shield-check" size={20} />
                            </div>
                            <span className="font-bold text-lg ml-3 hidden md:block">{t(lang, "adminPortal")}</span>
                        </div>
                        <nav className="flex-1 py-4 space-y-1 px-2 md:px-4">
                            <button onClick={() => setView('BOARD')} className={`w-full flex items-center gap-3 px-2 md:px-4 py-3 rounded-xl transition ${view === 'BOARD' ? 'bg-primary text-white shadow-lg shadow-primary/20' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>
                                <Icon name="layout-dashboard" size={20} />
                                <span className="font-medium hidden md:block">{t(lang, "kanbanBoard")}</span>
                            </button>
                            {currentUser.role === 'Admin' && (
                                <>
                                    <button onClick={() => setView('USERS')} className={`w-full flex items-center gap-3 px-2 md:px-4 py-3 rounded-xl transition ${view === 'USERS' ? 'bg-primary text-white shadow-lg shadow-primary/20' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>
                                        <Icon name="users" size={20} />
                                        <span className="font-medium hidden md:block">{t(lang, "manageUsers")}</span>
                                    </button>
                                    <button onClick={() => setView('SETTINGS')} className={`w-full flex items-center gap-3 px-2 md:px-4 py-3 rounded-xl transition ${view === 'SETTINGS' ? 'bg-primary text-white shadow-lg shadow-primary/20' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>
                                        <Icon name="settings" size={20} />
                                        <span className="font-medium hidden md:block">{t(lang, "settings")}</span>
                                    </button>
                                </>
                            )}
                        </nav>
                        <div className="p-4 border-t border-white/10">

                                <div className="w-8 h-8 rounded-full bg-emerald-500 flex items-center justify-center font-bold text-xs shrink-0">{currentUser.name.charAt(0)}</div>
                                <div className="hidden md:block text-sm font-medium truncate">{currentUser.name}</div>
                            </div>
                            <LanguageDropdown lang={lang} setLang={setLang} variant="dark" />
                            <button onClick={handleLogout} className="w-full flex items-center justify-center md:justify-start gap-3 px-2 md:px-4 py-2 mt-2 md:mt-0 rounded-lg text-sm text-red-400 hover:bg-red-500/10 transition">
                                <Icon name="log-out" size={18} /> <span className="hidden md:block">{t(lang, 'logout')}</span>
                            </button>
                            <button onClick={() => setIsDarkMode(!isDarkMode)} className="w-full flex items-center justify-center md:justify-start gap-3 px-2 md:px-4 py-2 mt-1 rounded-lg text-sm text-slate-400 hover:bg-white/5 transition">
                                {isDarkMode ? <Icon name="sun" size={18} /> : <Icon name="moon" size={18} />}
                                <span className="hidden md:block">{isDarkMode ? t(lang, 'light') : t(lang, 'dark')}</span>
                            </button>
                        </div>
                    </aside>

                    {/* Content */}
                    <main className="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50 dark:bg-slate-900">
                        {/* Header */}
                        <header className="h-16 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between px-6 shrink-0 z-10">
                            <h1 className="text-xl font-bold hidden sm:block">{view === 'BOARD' ? t(lang, 'kanbanBoard') : view === 'USERS' ? t(lang, 'manageUsers') : t(lang, 'sysSettings')}</h1>
                            <div className="flex items-center gap-4 w-full sm:w-auto justify-end">
                                {view === 'BOARD' && (
                                    <div className="relative flex-1 sm:w-64">
                                        <Icon name="search" size={16} className="absolute left-3 top-2.5 text-slate-400" />
                                        <input type="text" placeholder={t(lang, 'searchTickets')} className="w-full pl-9 pr-4 py-2 rounded-full border border-slate-200 dark:border-slate-700 bg-slate-100 dark:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-primary text-sm" value={search} onChange={e => setSearch(e.target.value)} />
                                    </div>
                                )}
                                {view === 'USERS' && (
                                    <button onClick={() => { setUserForm({ id: null, name: '', username: '', password: '', role: 'User', status: 'Active' }); setUserModalOpen(true); }} className="bg-primary hover:bg-primaryHover text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 shadow-sm shrink-0">
                                        <Icon name="plus" size={16} /> {t(lang, 'addUser')}
                                    </button>
                                )}
                                <div ref={notifRef} className="relative shrink-0">
                                    <div onClick={() => setIsNotifOpen(!isNotifOpen)} className="relative flex items-center justify-center p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 cursor-pointer transition" title={`${notifTickets.length} Tiket Baru (Open)`}>
                                        <Icon name="bell" size={20} className="text-slate-600 dark:text-slate-300" />

                                            <span className="absolute top-1 right-2 w-2.5 h-2.5 bg-red-500 border-2 border-white dark:border-slate-800 rounded-full animate-pulse"></span>

                                    {isNotifOpen && (
                                        <div className="absolute right-0 mt-2 w-72 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-xl z-50 fade-in">
                                            <div className="p-3 border-b border-slate-100 dark:border-slate-700 font-bold">{t(lang, 'newNotif')}</div>
                                            <div className="max-h-64 overflow-y-auto">
                                                {notifTickets.length > 0 ? (
                                                    notifTickets.map(t => (
                                                        <div key={t.id} onClick={() => { setSelectedTicket(t); setIsNotifOpen(false); }} className="p-3 hover:bg-slate-50 dark:hover:bg-slate-700 cursor-pointer border-b border-slate-100 dark:border-slate-700/50 transition">

                                                            <div className="text-xs text-slate-600 dark:text-slate-300 line-clamp-1 mb-1">{t.problem}</div>
                                                            <div className="text-[10px] text-slate-400">{new Date(t.date).toLocaleDateString('id-ID')}</div>
                                                        </div>

                        </header>

                        <div className="flex-1 overflow-auto p-6">
                            {view === 'BOARD' && (

                                        <div key={status} className="w-80 shrink-0 bg-slate-100/50 dark:bg-slate-800/50 rounded-2xl p-4 flex flex-col max-h-full border border-slate-200 dark:border-slate-700" onDragOver={handleDragOver} onDrop={(e) => handleDrop(e, status)}>

                                                <span className="bg-slate-200 dark:bg-slate-700 text-xs font-bold px-2 py-0.5 rounded-full">{filteredTickets.filter(t => t.status === status).length}</span>
                                            </div>
                                            <div className="flex-1 overflow-y-auto space-y-3 pr-1">
                                                {filteredTickets.filter(t => t.status === status).map(t => (
                                                    <div key={t.id} draggable onDragStart={(e) => handleDragStart(e, t.id)} onClick={() => setSelectedTicket(t)} className="bg-white dark:bg-slate-700 p-4 rounded-xl shadow-sm border border-slate-200 dark:border-slate-600 cursor-grab active:cursor-grabbing hover:shadow-md transition group">
                                                        <div className="flex justify-between items-start mb-2">
                                                            <span className="text-xs font-bold text-primary">{t.id}</span>
                                                            {t.attachment && <Icon name="paperclip" size={14} className="text-slate-400" />}

                                                        <p className="font-medium text-sm mb-3 line-clamp-2">{t.problem}</p>
                                                        <div className="flex justify-between items-center text-xs text-slate-500 mb-2">
                                                            <span className="px-2 py-0.5 rounded bg-slate-100 dark:bg-slate-800">{t.app}</span>
                                                        </div>
                                                        <div className="flex justify-between items-center">
                                                            {t.assignee ? (
                                                                <div className="flex items-center gap-1 text-xs text-primary">
                                                                    <Icon name="users" size={14} /> <span>{t.assignee}</span>
                                                                </div>
                                                            ) : <div />}
                                                            <div className="flex items-center gap-1 text-xs text-slate-500">
                                                                <div className={`w-2 h-2 rounded-full ${t.priority === 'Critical' ? 'bg-red-500' : t.priority === 'High' ? 'bg-amber-500' : 'bg-blue-400'}`}></div>
                                                                <span>{t.priority}</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {view === 'USERS' && (
                                <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden fade-in">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700 text-xs uppercase tracking-wider text-slate-500">
                                                <th className="p-4 font-semibold">Nama</th>
                                                <th className="p-4 font-semibold">Username</th>
                                                <th className="p-4 font-semibold">Role</th>
                                                <th className="p-4 font-semibold">Status</th>
                                                <th className="p-4 font-semibold">Last Login</th>
                                                <th className="p-4 font-semibold text-right">Aksi</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-200 dark:divide-slate-700">

                                                <tr key={u.id} className="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition">
                                                    <td className="p-4 font-medium">{u.name}</td>
                                                    <td className="p-4 text-slate-500">{u.username}</td>
                                                    <td className="p-4">
                                                        <span className={`px-2 py-1 rounded text-xs font-medium ${u.role === 'Admin' ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-100 text-slate-700 dark:bg-slate-700 dark:text-slate-300'}`}>{u.role}</span>
                                                    </td>
                                                    <td className="p-4">
                                                        <span className={`flex items-center gap-1.5 text-xs font-medium ${u.status === 'Active' ? 'text-emerald-600 dark:text-emerald-400' : 'text-red-500'}`}>
                                                            <div className={`w-1.5 h-1.5 rounded-full ${u.status === 'Active' ? 'bg-emerald-500' : 'bg-red-500'}`}></div>
                                                            {u.status}
                                                        </span>
                                                    </td>
                                                    <td className="p-4 text-sm text-slate-500">{u.lastLogin ? new Date(u.lastLogin).toLocaleDateString('id-ID') : '-'}</td>
                                                    <td className="p-4 text-right space-x-2">
                                                        <button onClick={() => { setUserForm({ ...u, password: '' }); setUserModalOpen(true); }} className="p-1.5 text-slate-400 hover:text-primary hover:bg-indigo-50 dark:hover:bg-indigo-900/30 rounded"><Icon name="edit" size={16} /></button>
                                                        {u.username !== 'admin' && (
                                                            <button onClick={async () => {
                                                                if (confirm('Hapus user ini?')) {
                                                                    try { await apiCall(config, 'deleteUser', { userId: u.id }); loadData(); showToast('Terhapus'); }
                                                                    catch (e) { showToast(e.message, 'error'); }
                                                                }
                                                            }} className="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded"><Icon name="trash" size={16} /></button>
                                                        )}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}

                            {view === 'SETTINGS' && (
                                <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 p-6 fade-in space-y-10">
                                    <div className="bg-indigo-50 dark:bg-indigo-900/20 text-indigo-800 dark:text-indigo-300 p-4 rounded-xl text-sm flex items-start gap-3">
                                        <Icon name="info" className="shrink-0 mt-0.5" size={18} />
                                        <p>Data di bawah ini digunakan untuk mengatur opsi Dropdown (Pilihan) pada form pembuatan dan pengeditan tiket. Tekan <strong>Enter</strong> pada kolom input untuk menambahkan opsi baru.</p>
                                    </div>
                                    {['apps', 'priorities', 'statuses'].map(key => (
                                        <div key={key}>
                                            <h3 className="text-lg font-bold mb-1">{key === 'apps' ? `Daftar ${t(lang, 'appModule')}` : key === 'priorities' ? `Daftar ${t(lang, 'catPriority')}` : 'Daftar Status Tiket'}</h3>
                                            <p className="text-sm text-slate-500 mb-4">Kelola opsi yang akan muncul di dropdown {key === 'apps' ? 'Aplikasi' : key === 'priorities' ? 'Kategori/Prioritas' : 'Status'}.</p>

                                            <div className="flex flex-wrap gap-2 mb-4">
                                                {settings[key]?.map((item, idx) => (
                                                    <div key={idx} className="flex items-center gap-2 bg-slate-100 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 px-3 py-1.5 rounded-lg text-sm font-medium shadow-sm">
                                                        <span>{item}</span>
                                                        <button onClick={async () => {
                                                            if (confirm(`Hapus "${item}" dari daftar?`)) {
                                                                const newArr = settings[key].filter((_, i) => i !== idx);
                                                                const newSet = { ...settings, [key]: newArr };
                                                                try {
                                                                    await apiCall(config, 'saveSettings', { settings: newSet });
                                                                    setSettings(newSet);
                                                                    showToast('Item berhasil dihapus');
                                                                } catch (e) { showToast(e.message, 'error'); }
                                                            }
                                                        }} className="text-slate-400 hover:text-red-500 transition ml-1"><Icon name="x" size={14} /></button>
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="flex gap-2 max-w-sm">
                                                <input type="text" placeholder="Ketik nama opsi baru, lalu tekan Enter..." className="flex-1 px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-transparent focus:ring-2 focus:ring-primary outline-none text-sm transition" onKeyDown={async (e) => {
                                                    if (e.key === 'Enter' && e.target.value.trim() !== '') {
                                                        const val = e.target.value.trim();
                                                        if (settings[key]?.includes(val)) return showToast('Opsi sudah ada!', 'error');
                                                        const newSet = { ...settings, [key]: [...(settings[key] || []), val] };
                                                        try {
                                                            await apiCall(config, 'saveSettings', { settings: newSet });
                                                            setSettings(newSet);
                                                            e.target.value = '';
                                                            showToast('Opsi berhasil ditambahkan');
                                                        } catch (err) { showToast(err.message, 'error'); }
                                                    }
                                                }} />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Modals */}
                    <TicketDetailModal
                        ticket={selectedTicket}
                        onClose={() => setSelectedTicket(null)}
                        currentUser={currentUser}
                        users={users}
                        settings={settings}
                        showToast={showToast} lang={lang} setLang={setLang} t={t}
                        onUpdate={async (ticketId, updateData) => {
                            const payload = {
                                ticket: { id: ticketId, ...updateData },
                                user: currentUser
                            };
                            const updated = await apiCall(config, 'saveTicket', payload);
                            setTickets(tickets.map(x => x.id === ticketId ? updated : x));
                            showToast('Tiket berhasil diupdate!');
                        }}
                    />

                    {userModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4 fade-in">
                            <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-md">
                                <div className="flex justify-between items-center p-6 border-b border-slate-200 dark:border-slate-700">
                                    <h3 className="text-xl font-bold">{userForm.id ? 'Edit User' : t(lang, 'addUser')}</h3>
                                    <button onClick={() => setUserModalOpen(false)} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full transition"><Icon name="x" /></button>
                                </div>
                                <form onSubmit={handleSaveUser} className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium mb-1">Nama Lengkap</label>
                                        <input required type="text" className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent focus:ring-2 focus:ring-primary outline-none" value={userForm.name} onChange={e => setUserForm({ ...userForm, name: e.target.value })} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium mb-1">Username</label>
                                        <input required type="text" className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent focus:ring-2 focus:ring-primary outline-none" value={userForm.username} onChange={e => setUserForm({ ...userForm, username: e.target.value })} disabled={userForm.username === 'admin'} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium mb-1">{userForm.id ? 'Password Baru (Kosongkan jika tidak diubah)' : 'Password'}</label>
                                        <input required={!userForm.id} type="password" className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent focus:ring-2 focus:ring-primary outline-none" value={userForm.password} onChange={e => setUserForm({ ...userForm, password: e.target.value })} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium mb-1">Role</label>
                                            <select className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent focus:ring-2 focus:ring-primary outline-none" value={userForm.role} onChange={e => setUserForm({ ...userForm, role: e.target.value })} disabled={userForm.username === 'admin'}>
                                                <option value="User">User</option>
                                                <option value="Tim IT">Tim IT</option>
                                                <option value="Admin">Admin</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1">Status</label>
                                            <select className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent focus:ring-2 focus:ring-primary outline-none" value={userForm.status} onChange={e => setUserForm({ ...userForm, status: e.target.value })} disabled={userForm.username === 'admin'}>
                                                <option value="Active">Active</option>
                                                <option value="Inactive">Inactive</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="pt-4 flex justify-end">
                                        <button type="submit" disabled={isSubmitting} className="bg-primary hover:bg-primaryHover text-white px-6 py-2.5 rounded-xl font-medium shadow-sm transition-all flex items-center gap-2">
                                            {isSubmitting ? 'Menyimpan...' : 'Simpan'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };



        function App() {
            // Theme State
            const [isDarkMode, setIsDarkMode] = useState(() => {
                const saved = localStorage.getItem('theme');
                if (saved) return saved === 'dark';
                return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            });

            useEffect(() => {
                localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            // App States
            const [appState, setAppState] = useState('LOADING'); // LOADING, SETUP, LOGIN, ADMIN_DASHBOARD, USER_DASHBOARD
            const [config, setConfig] = useState({ api: '', sheetId: '', folderId: '' });
            const [currentUser, setCurrentUser] = useState(null);
            const [lang, setLang] = useState('MY');
            const [users, setUsers] = useState([]);
            const [tickets, setTickets] = useState([]);
            const [settings, setSettings] = useState({ apps: [], priorities: [], statuses: [] });
            const [isLoading, setIsLoading] = useState(false);
            const [toast, setToast] = useState(null);

            const showToast = (message, type = 'success') => {
                setToast({ message, type, id: Date.now() });
                setTimeout(() => setToast(null), 3000);
            };

            // Init from URL or LocalStorage
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const pApi = params.get('api');
                const pSheet = params.get('sheetId');
                const pFolder = params.get('folderId');

                const savedConfig = JSON.parse(localStorage.getItem('appConfig') || '{}');

                let finalConfig = {
                    api: HARDCODED_API_URL || pApi || savedConfig.api || '',
                    sheetId: DEFAULT_SHEET_ID || pSheet || savedConfig.sheetId || '',
                    folderId: DEFAULT_FOLDER_ID || pFolder || savedConfig.folderId || ''
                };

                setConfig(finalConfig);

                if (finalConfig.api && finalConfig.sheetId && finalConfig.folderId) {
                    localStorage.setItem('appConfig', JSON.stringify(finalConfig));

                    const savedUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
                    if (savedUser) {
                        setCurrentUser(savedUser);
                        setAppState(savedUser.role === 'Admin' || savedUser.role === 'Tim IT' ? 'ADMIN_DASHBOARD' : 'USER_DASHBOARD');
                    } else {
                        setAppState('LOGIN');
                    }
                } else {
                    setAppState('SETUP');
                }
            }, []);

            const handleLogout = () => {
                localStorage.removeItem('currentUser');
                setCurrentUser(null);
                setAppState('LOGIN');
                showToast("Berhasil logout", "success");
            };

            const loadData = async () => {
                setIsLoading(true);
                try {
                    const settingsData = await apiCall(config, 'getSettings');
                    setSettings(settingsData);

                    if (currentUser.role === 'Admin' || currentUser.role === 'Tim IT') {
                        const usersData = await apiCall(config, 'getUsers');
                        setUsers(usersData);
                    }
                    const ticketsData = await apiCall(config, 'getTickets');
                    setTickets(ticketsData);
                } catch (error) {
                    showToast(error.message, 'error');
                } finally {
                    setIsLoading(false);
                }
            };

            useEffect(() => {
                let interval;
                if (appState === 'ADMIN_DASHBOARD' || appState === 'USER_DASHBOARD') {
                    loadData();
                    // Auto-refresh tickets every 15 seconds
                    interval = setInterval(() => {
                        apiCall(config, 'getTickets').then(data => {
                            setTickets(data);
                        }).catch(e => console.log('Auto-refresh silent err', e));
                    }, 15000);
                }
                return () => { if (interval) clearInterval(interval); };
            }, [appState]);

            // TOAST RENDERER
            const renderToast = () => {
                if (!toast) return null;
                return (
                    <div className="fixed bottom-6 right-6 z-50 fade-in">
                        <div className={`px-4 py-3 rounded-xl shadow-lg border flex items-center gap-3 ${toast.type === 'error' ? 'bg-red-50 dark:bg-red-900/30 border-red-200 dark:border-red-800 text-red-700 dark:text-red-400' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200'}`}>
                            {toast.type === 'error' ? <div className="w-2 h-2 rounded-full bg-red-500"></div> : <div className="w-2 h-2 rounded-full bg-emerald-500"></div>}
                            <span className="font-medium text-sm">{toast.message}</span>
                        </div>
                    </div>
                );
            };

            // Loading state overlay
            if (isLoading && !currentUser) {
                return <div className="h-screen w-full flex items-center justify-center bg-slate-50 dark:bg-slate-900 text-primary"><div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-primary"></div></div>;
            }

            return (
                <div className="text-slate-800 dark:text-slate-200 font-sans h-screen w-full overflow-hidden">
                    {appState === 'SETUP' && <SetupScreen config={config} setConfig={setConfig} setAppState={setAppState} showToast={showToast} lang={lang} setLang={setLang} t={t} apiCall={apiCall} />}
                    {appState === 'LOGIN' && <LoginScreen config={config} setCurrentUser={setCurrentUser} setAppState={setAppState} showToast={showToast} lang={lang} setLang={setLang} t={t} hashPassword={hashPassword} apiCall={apiCall} />}
                    {appState === 'USER_DASHBOARD' && <UserDashboard config={config} currentUser={currentUser} users={users} tickets={tickets} setTickets={setTickets} settings={settings} loadData={loadData} showToast={showToast} lang={lang} setLang={setLang} t={t} isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} handleLogout={handleLogout} apiCall={apiCall} PRIORITIES={PRIORITIES} />}
                    {appState === 'ADMIN_DASHBOARD' && <AdminDashboard config={config} currentUser={currentUser} users={users} tickets={tickets} setTickets={setTickets} settings={settings} setSettings={setSettings} loadData={loadData} showToast={showToast} lang={lang} setLang={setLang} t={t} isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} handleLogout={handleLogout} apiCall={apiCall} TICKET_STATUSES={TICKET_STATUSES} hashPassword={hashPassword} />}

                    {/* Global loading indicator overlay */}
                    {isLoading && currentUser && (
                        <div className="fixed top-4 right-4 z-50 bg-white/80 dark:bg-slate-800/80 backdrop-blur px-3 py-1.5 rounded-full shadow-sm border border-slate-200 dark:border-slate-700 flex items-center gap-2 text-xs font-medium fade-in">
                            <div className="w-3 h-3 border-2 border-primary border-t-transparent rounded-full animate-spin"></div> Syncing...
                        </div>
                    )}

                    {renderToast()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
